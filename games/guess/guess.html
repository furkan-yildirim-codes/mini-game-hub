<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sayı Tahmin Oyunu</title>
    <link rel="stylesheet" href="../../style.css">
</head>

<body class="guess-page">

<div class="countdown-widget" id="countdownWidget" aria-live="polite">
    <div class="countdown-content">
        <span class="countdown-label">Kalan Süre⏰</span>
        <strong class="countdown-time" id="countdownTime">00:00:00</strong>
    </div>
</div>

<main class="guess-game">
    <section class="guess-hero" aria-label="Sayı tahmin oyunu">
        <div class="number-badge">?</div>
        <h2>Sayı Tahmin Oyunu</h2>
        <p>Aklımdaki sayıyı bul. Zorluğu seç, Tahminini gir, İpuçlarını takip et.</p>
        <div class="countdown-actions">
            <button type="button" class="countdown-toggle" id="countdownToggle" aria-expanded="false">
                Sayacı Aç
            </button>
            <button type="button" class="countdown-toggle countdown-reset" id="countdownReset">
                Sıfırla
            </button>
            <button type="button" class="countdown-toggle countdown-customize" id="customizeToggle" aria-expanded="false">
                Özelleştir
            </button>
        </div>
    </section>

    <section class="custom-panel" id="customPanel" aria-label="Özel oyun ayarları" hidden>
        <div class="custom-grid">
            <label>
                <span>1'den kaça kadar olacağını seç</span>
                <input type="number" id="customMaxNumber" min="10" max="9999" value="100">
            </label>
            <label>
                <span>Süre (saniye)</span>
                <input type="number" id="customTimeLimit" min="0" max="3600" value="60">
            </label>
            <label>
                <span>İpucu Durumu</span>
                <select id="customHintMode">
                    <option value="always">Her yanlışta ver</option>
                    <option value="sometimes" selected>Ara sıra ver</option>
                    <option value="never">Verme</option>
                </select>
            </label>
        </div>
        <button class="btn btn-primary" type="button" id="applyCustomSettings">Özel Modu Seç</button>
    </section>

    <section class="game-panel">
        <div class="control-row">
            <span class="difficulty-label">Zorluk</span>
            <div class="difficulty-buttons" id="difficulty">
                <button class="difficulty-btn" type="button" data-difficulty="kolay" onclick="selectDifficulty(this)">Kolay</button>
                <button class="difficulty-btn" type="button" data-difficulty="orta" onclick="selectDifficulty(this)">Orta</button>
                <button class="difficulty-btn" type="button" data-difficulty="zor" onclick="selectDifficulty(this)">Zor</button>
            </div>
            <button class="btn btn-primary" onclick="startGame()">Başlat</button>
        </div>

        <div class="guess-row">
            <input type="number" id="guessInput" placeholder="Tahmin gir">
            <button class="btn btn-accent" onclick="checkGuess()">Tahmin Et</button>
        </div>

        <div class="panel-actions">
            <button class="btn btn-secondary" onclick="restartGame()">Yeniden Oyna</button>
            <a class="btn btn-exit" id="exitButton" href="../../index.html">Çıkış</a>
        </div>

        <pre id="output" class="game-output"></pre>
    </section>
</main>

<script src="game.js"></script>

</body>
</html>
